<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SPICECORE PRO | 結構穩定性分析系統</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #f97316; --safe: #238636; --danger: #da3633; --text: #e6edf3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* 控制面板 */
        .sidebar { width: 340px; background: var(--panel); padding: 25px; border-right: 1px solid #30363d; display: flex; flex-direction: column; gap: 15px; z-index: 10; overflow-y: auto; }
        .logo { font-size: 14px; color: var(--accent); font-weight: 800; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 10px; }
        .control-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px solid #30363d; }
        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .val-num { float: right; color: var(--accent); font-weight: bold; font-size: 14px; }

        /* 中央模擬區 */
        .main-stage { flex: 1; position: relative; background-image: radial-gradient(#21262d 1px, transparent 1px); background-size: 30px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 【關鍵】連動主體結構 */
        .bottle-container { position: relative; display: flex; flex-direction: column; align-items: center; transform-origin: bottom center; will-change: transform; }
        .cap { background: #d2b48c; height: 45px; width: 90px; border-radius: 10px 10px 2px 2px; border-bottom: 4px solid rgba(0,0,0,0.2); z-index: 2; }
        .glass-body { background: rgba(255,255,255,0.1); width: 85px; border: 2px solid rgba(255,255,255,0.3); border-radius: 2px 2px 15px 15px; backdrop-filter: blur(10px); position: relative; overflow: hidden; margin-top: -2px; }
        .content-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #4a3728, #5d4637); transition: height 0.2s; }

        /* 數值大盤 */
        .big-data { font-size: 72px; font-weight: 900; letter-spacing: -3px; margin-top: 20px; color: #fff; line-height: 1; }
        .unit-label { font-size: 11px; color: #8b949e; letter-spacing: 2px; margin-top: 5px; }

        /* 右側公式區 (連動妳的截圖風格) */
        .data-panel { width: 360px; background: var(--panel); padding: 25px; border-left: 1px solid #30363d; overflow-y: auto; }
        .formula-card { background: #0d1117; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .math-title { font-size: 10px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; }
        .math-exp { font-size: 16px; color: #58a6ff; margin-bottom: 5px; }
        .math-res { font-size: 12px; color: #d1d5da; font-family: monospace; }
        #alarm-text { color: var(--danger); font-weight: bold; text-align: center; margin-top: 10px; display: none; border: 1px solid var(--danger); padding: 10px; }
    </style>
</head>
<body>

        <div class="logo">SPICECORE STRESS TEST v3.0</div>

            <label>1. 內容載重 Mass (kg) <span class="val-num" id="v1">5.0</span></label>
            <input type="range" min="1" max="50" step="0.5" value="5" id="p1">
        </div>
        <div class="control-item">
            <label>2. 外部壓力 Force (N) <span class="val-num" id="v2">0</span></label>
            <input type="range" min="0" max="1500" value="0" id="p2">
        </div>
        <div class="control-item">

            <input type="range" min="0" max="300" value="0" id="p3">
        </div>
