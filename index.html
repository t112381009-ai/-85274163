<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>智慧控量調味罐 - 力學模擬</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 320px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h2 { font-size: 1.2rem; margin-bottom: 20px; color: #94a3b8; }
    .bottle-container { height: 200px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 20px; }
    
    /* 這裡模擬你的設計：米色蓋子 + 透明罐身 */
    .bottle { width: 70px; transform-origin: bottom center; transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    .cap { background: #d2b48c; height: 35px; border-radius: 8px 8px 2px 2px; border: 2px solid #b39b7d; }
    .body { background: rgba(255,255,255,0.1); height: 110px; border: 2px solid rgba(255,255,255,0.3); border-radius: 2px 2px 12px 12px; backdrop-filter: blur(5px); }
    
    input[type=range] { width: 100%; margin: 15px 0; accent-color: #d2b48c; }
    .status { font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 15px; }
    .bad { background: #7f1d1d; color: #fca5a5; }
    .good { background: #064e3b; color: #6ee7b7; }
    .data-box { font-size: 0.8rem; color: #64748b; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🍶 工設力學模擬 APP</h1>
  <div class="card">
    <h2>產品穩定度測試 (Stability Test)</h2>
    <div class="bottle-container">
      <div class="bottle" id="bottle">
        <div class="cap"></div>
        <div class="body"></div>
      </div>
    </div>
    <p>裝載重量：<span id="w-val">3</span> kg</p>
    <input type="range" min="1" max="10" value="3" id="weight">
    <p>重心高度：<span id="h-val">150</span> mm</p>
    <input type="range" min="100" max="400" value="150" id="height">
    <div class="status" id="status">穩定運行中</div>
    <div class="data-box" id="info">力矩平衡分析中...</div>
  </div>

  <script>
    const weight = document.getElementById("weight");
    const height = document.getElementById("height");
    const bottle = document.getElementById("bottle");
    const status = document.getElementById("status");
    const info = document.getElementById("info");

    function update() {
      let w = Number(weight.value);
      let h = Number(height.value);
      document.getElementById("w-val").innerText = w;
      document.getElementById("h-val").innerText = h;

      // 工設計算公式：重心偏移風險 = 高度 / 重量
      let risk = (h / w);
      let angle = (risk - 50) * 0.15; // 模擬傾斜角度
      bottle.style.transform = `rotate(${angle}deg)`;

      if (risk > 100) {
        status.innerText = "⚠️ 警報：重心不穩";
        status.className = "status bad";
        info.innerText = "當前力矩已超出底座支撐範圍！";
      } else {
        status.innerText = "✔ 結構穩定";
        status.className = "status good";
        info.innerText = "重心位於 PCTG 罐身安全區域。";
      }
    }
    weight.oninput = update;
    height.oninput = update;
    update();
  </script>
</body>
</html>
