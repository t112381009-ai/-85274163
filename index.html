<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SpiceJar Analytics v2.0</title>
    <style>
        :root { --bg-dark: #1a202c; --panel-dark: #2d3748; --accent-gold: #d2b48c; --text-gray: #a0aec0; --safe-green: #2f855a; --danger-red: #c53030; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 主容器：圓角深色面板 */
        .main-card { background: var(--panel-dark); width: 100%; max-width: 500px; border-radius: 24px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        h1 { font-size: 20px; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: var(--text-gray); margin-bottom: 20px; }

        /* 頂部預覽區 */
        .preview-box { background: rgba(0,0,0,0.2); border-radius: 16px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        
        /* 【關鍵】連動罐子主體 */
        .bottle-wrapper { position: relative; width: 80px; transform-origin: bottom center; transition: transform 0.1s ease-out; }
        .cap { background: var(--accent-gold); height: 35px; border-radius: 8px 8px 2px 2px; width: 100%; }
        .body { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 2px 2px 10px 10px; width: 90%; margin: 0 auto; position: relative; overflow: hidden; }
        .fill { position: absolute; bottom: 0; width: 100%; background: #4a4a4a; transition: height 0.3s; }

        /* 滑桿樣式 */
        .control-group { margin-bottom: 16px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: var(--text-gray); }
        .val-num { color: var(--accent-gold); font-weight: bold; }
        input[type=range] { width: 100%; -webkit-appearance: none; background: #4a5568; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-gold); cursor: pointer; border: 2px solid var(--panel-dark); }

        /* 底部數據框 */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .data-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; text-align: center; }
        .data-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 4px; }
        .data-val { font-size: 16px; font-weight: bold; color: #63b3ed; }

        /* 狀態標籤 */
        .status-bar { margin-top: 20px; background: rgba(47, 133, 90, 0.2); color: #68d391; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; border: 1px solid var(--safe-green); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>SpiceJar Analytics v2.0</h1>
    <p class="subtitle">Industrial Design Mechanics Simulation</p>

    <div class="preview-box">
        <div class="bottle-wrapper" id="bottle">
            <div class="cap" id="cap-ui"></div>
            <div class="body" id="body-ui" style="height: 120px;">
                <div class="fill" id="fill-ui"></div>
            </div>
        </div>
    </div>

    <div class="control-group">
        <div class="label-row"><span>1. 瓶蓋重心高度 (CAP HEIGHT)</span><span class="val-num" id="v1">35</span></div>
        <input type="range" min="20" max="60" value="35" id="p1">
    </div>
    <div class="control-group">
        <div class="label-row"><span>2. 內容物填裝量 (FILL VOLUME) %</span><span class="val-num" id="v2">40</span></div>
        <input type="range" min="0" max="100" value="40" id="p2">
    </div>
    <div class="control-group">
        <div class="label-row"><span>3. 外部擠壓力 (PRESSURE FORCE) N</span><span class="val-num" id="v3">0</span></div>
        <input type="range" min="0" max="100" value="0" id="p3">
    </div>
    <div class="control-group">
        <div class="label-row"><span>4. 底座寬度係數 (BASE WIDTH) X</span><span class="val-num" id="v4">0.9</span></div>
        <input type="range" min="0.5" max="1.5" step="0.1" value="0.9" id="p4">
    </div>
    <div class="control-group">
        <div class="label-row"><span>5. 使用傾斜角度 (TILT ANGLE) °</span><span class="val-num" id="v5">0</span></div>
        <input type="range" min="-45" max="45" value="0" id="p5">
    </div>

    <div class="data-grid">
        <div class="data-item">
            <div class="data-label">傾斜矩 (Tilt Moment)</div>
            <div class="data-val" id="d1">0.00 Nm</div>
        </div>
        <div class="data-item">
            <div class="data-label">壓迫應力 (Stress)</div>
            <div class="data-val" id="d2" style="color: #63b3ed;">0.00 kPa</div>
        </div>
    </div>

    <div class="status-bar" id="status-ui">✔ 系統狀態：結構穩定 (Stable)</div>
</div>

<script>
    const sliders = ['p1', 'p2', 'p3', 'p4', 'p5'];
    const bottle = document.getElementById('bottle');
    const capUI = document.getElementById('cap-ui');
    const bodyUI = document.getElementById('body-ui');
    const fillUI = document.getElementById('fill-ui');

    function update() {
        const capH = parseFloat(document.getElementById('p1').value);
        const fillP = parseFloat(document.getElementById('p2').value);
        const press = parseFloat(document.getElementById('p3').value);
        const width = parseFloat(document.getElementById('p4').value);
        const tilt = parseFloat(document.getElementById('p5').value);

        // 更新文字
        document.getElementById('v1').innerText = capH;
        document.getElementById('v2').innerText = fillP;
        document.getElementById('v3').innerText = press;
        document.getElementById('v4').innerText = width;
        document.getElementById('v5').innerText = tilt;

        // ---【核心連動邏輯】---
        
        // 1. 瓶蓋高度：直接改變瓶蓋 Div 的高度
        capUI.style.height = capH + "px";

        // 2. 內容物填裝量：改變內部填充色的高度
        fillUI.style.height = fillP + "%";

        // 3. 底座寬度：改變瓶身的寬度比例
        bottle.style.width = (80 * width) + "px";

        // 4. 傾斜角度：罐子本體旋轉
        // 外部壓力也會額外增加一點歪斜感
        const totalTilt = tilt + (press * 0.2);
        bottle.style.transform = `rotate(${totalTilt}deg)`;

        // 5. 數據計算模擬
        const moment = (tilt * 0.25).toFixed(2);
        const stress = (press * 0.5 + capH * 0.1).toFixed(2);
        document.getElementById('d1').innerText = moment + " Nm";
        document.getElementById('d2').innerText = stress + " kPa";

        // 6. 狀態判定
        const status = document.getElementById('status-ui');
        if (Math.abs(totalTilt) > 30 || stress > 40) {
            status.innerText = "⚠️ 警告：重心偏移 / 結構負擔過重";
            status.style.backgroundColor = "rgba(197, 48, 48, 0.2)";
            status.style.borderColor = "var(--danger-red)";
            status.style.color = "#fc8181";
        } else {
            status.innerText = "✔ 系統狀態：結構穩定 (Stable)";
            status.style.backgroundColor = "rgba(47, 133, 90, 0.2)";
            status.style.borderColor = "var(--safe-green)";
            status.style.color = "#68d391";
        }
    }

    // 綁定事件
    sliders.forEach(id => document.getElementById(id).addEventListener('input', update));
    
    // 初始化
    update();
</script>

</body>
</html>
