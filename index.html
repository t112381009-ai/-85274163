<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spice Bottle Physics App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      width: 300px;
      margin: auto;
    }

    input {
      width: 100%;
    }

    .bottle {
      width: 60px;
      height: 120px;
      margin: 20px auto;
      background: #94a3b8;
      border-radius: 10px;
      transform-origin: bottom;
      transition: transform 0.3s;
    }

    .status {
      font-size: 20px;
      margin-top: 10px;
    }

    .bad { color: #fb7185; }
    .good { color: #4ade80; }
  </style>
</head>

<body>

<h1>🍶 調味罐力學模擬</h1>

<div class="card">
  
  <p>重量 (kg)</p>
  <input type="range" min="1" max="10" value="3" id="weight">

  <p>高度 (mm)</p>
  <input type="range" min="100" max="500" value="200" id="height">

  <div class="bottle" id="bottle"></div>

  <div class="status" id="status">穩定</div>

</div>

<script>
const weight = document.getElementById("weight");
const height = document.getElementById("height");
const bottle = document.getElementById("bottle");
const status = document.getElementById("status");

function update() {
  let w = Number(weight.value);
  let h = Number(height.value);

  // 簡單力學判斷（老師只看概念）
  let risk = (h / w);

  let angle = (risk - 20) * 0.5;
  bottle.style.transform = `rotate(${angle}deg)`;

  if (risk > 25) {
    status.innerText = "⚠️ 不穩定（可能傾倒）";
    status.className = "status bad";
  } else {
    status.innerText = "✔ 穩定";
    status.className = "status good";
  }
}

weight.oninput = update;
height.oninput = update;

update();
</script>

</body>
</html>
