<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>智慧調味罐力學模擬</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 20px; width: 300px; margin: auto; border: 1px solid #334155; }
    .bottle-box { height: 180px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 20px; }
    .bottle { width: 70px; transform-origin: bottom center; transition: transform 0.2s; }
    .cap { background: #d2b48c; height: 35px; border-radius: 8px 8px 2px 2px; } /* 米色蓋子 */
    .body { background: rgba(255,255,255,0.1); height: 100px; border: 1px solid rgba(255,255,255,0.3); border-radius: 2px 2px 10px 10px; backdrop-filter: blur(5px); } /* 透明罐身 */
    input { width: 100%; margin: 10px 0; }
    .status { padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    .safe { background: #064e3b; color: #6ee7b7; }
    .danger { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <h2>🍶 產品力學穩定度模擬</h2>
  <div class="card">
    <div class="bottle-box"><div class="bottle" id="bottle"><div class="cap"></div><div class="body"></div></div></div>
    <p>重心高度: <span id="h-txt">150</span>mm</p><input type="range" min="100" max="400" value="150" id="h-in">
    <p>內容重量: <span id="w-txt">3</span>kg</p><input type="range" min="1" max="10" value="3" id="w-in">
    <div id="msg" class="status safe">結構穩定</div>
  </div>
  <script>
    const hI = document.getElementById('h-in'), wI = document.getElementById('w-in'), b = document.getElementById('bottle'), m = document.getElementById('msg');
    function v() {
      let h = hI.value, w = wI.value;
      document.getElementById('h-txt').innerText = h; document.getElementById('w-txt').innerText = w;
      let r = h / w; b.style.transform = `rotate(${(r-50)*0.2}deg)`;
      if(r > 100) { m.innerText = "⚠️ 警報：重心不穩"; m.className = "status danger"; }
      else { m.innerText = "✔ 結構穩定"; m.className = "status safe"; }
    }
    hI.oninput = v; wI.oninput = v;
  </script>
</body>
</html>
