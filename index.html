<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>調味罐力學模擬 APP</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 15px; width: 300px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .bottle-box { height: 180px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 20px; }
    .bottle { width: 60px; transform-origin: bottom center; transition: transform 0.2s; }
    .cap { background: #d2b48c; height: 30px; border-radius: 5px 5px 0 0; } /* 米色蓋子 */
    .body-part { background: rgba(255,255,255,0.2); height: 100px; border: 1px solid white; border-radius: 0 0 5px 5px; } /* 透明罐身 */
    input { width: 100%; margin: 10px 0; }
    .status { padding: 10px; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    .safe { background: #064e3b; color: #6ee7b7; }
    .danger { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <h1>🍶 力學模擬測試</h1>
  <div class="card">
    <div class="bottle-box">
      <div class="bottle" id="bottle">
        <div class="cap"></div>
        <div class="body-part"></div>
      </div>
    </div>
    <p>重心高度: <span id="h-txt">150</span>mm</p>
    <input type="range" min="100" max="400" value="150" id="h-in">
    <p>底部重量: <span id="w-txt">3</span>kg</p>
    <input type="range" min="1" max="10" value="3" id="w-in">
    <div id="msg" class="status safe">結構穩定</div>
  </div>
  <script>
    const hIn = document.getElementById('h-in'), wIn = document.getElementById('w-in');
    const b = document.getElementById('bottle'), m = document.getElementById('msg');
    function v() {
      let h = hIn.value, w = wIn.value;
      document.getElementById('h-txt').innerText = h;
      document.getElementById('w-txt').innerText = w;
      let r = h / w; 
      b.style.transform = `rotate(${(r-50)*0.2}deg)`;
      if(r > 100) { m.innerText = "⚠️ 重心過高：不穩定"; m.className = "status danger"; }
      else { m.innerText = "✔ 結構穩定"; m.className = "status safe"; }
    }
    hIn.oninput = v; wIn.oninput = v;
  </script>
</body>
</html>
